<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    direction: rtl;
}

.login-box {
    width: 300px;
    margin: 100px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #2e7d32;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #1b5e20;
}
</style>

</head>

<body>

<div class="login-box">
    <h2>تسجيل الدخول</h2>

    <input type="text" placeholder="اسم المستخدم" id="user">
    <input type="password" placeholder="كلمة المرور" id="pass">

    <button onclick="login()">دخول</button>
</div>

<script>
function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user === "mazen" && pass === "1234") {
        window.location.href = "fees.html";
    } else {
        alert("بيانات غلط");
    }
}
</script>

</body>
</html>
